<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
</head>
<body>
    <div id="log">Testing...</div>

    <script type="module">
        // Import only what is strictly necessary
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACkpKa9X-L-k6vnG4Zb3vi-9DB_amNJ2w",
            authDomain: "mail-d1326.firebaseapp.com",
            projectId: "mail-d1326",
            storageBucket: "mail-d1326.firebasestorage.app",
            messagingSenderId: "451137486895",
            appId: "1:451137486895:web:40de2a8c7986f7c46b46da"
        };

        const log = (msg) => document.getElementById('log').innerHTML += "<br>" + msg;

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            log("Firebase initialized.");
            
            const querySnapshot = await getDocs(collection(db, "inbox"));
            log("Database connected. Found " + querySnapshot.size + " documents.");
        } catch (error) {
            log("CRITICAL ERROR: " + error.message);
        }
    </script>
</body>
</html>
